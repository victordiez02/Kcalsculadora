services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PORT: "8000"
      ALLOWED_ORIGINS: http://localhost:5173
    volumes:
      - ./backend/app:/app/app
    ports:
      - "8000:8000"

  backend-diet:
    build: ./backend-diet
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    env_file:
      - ./backend-diet/.env # OPENAI_API_KEY (no se versiona)
    environment:
      PORT: 8001
      ALLOWED_ORIGINS: http://localhost:5173
    volumes:
      # Solo el código: el índice Chroma (versionado en backend-diet/vectorstore/)
      # entra en la imagen por COPY y vive en /app/vectorstore, fuera del mount
      - ./backend-diet/app:/app/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build
    command: pnpm dev
    environment:
      VITE_BACKEND_PROXY_TARGET: http://backend:8000
      VITE_DIET_BACKEND_PROXY_TARGET: http://backend-diet:8001
      VITE_USE_POLLING: "true"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    ports:
      - "5173:5173"
    depends_on:
      - backend
      - backend-diet
